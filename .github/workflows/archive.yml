name: Archive municipalities to Wayback

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: municipality-wayback-archive
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run archive batch
        run: |
          python archive_wayback.py \
            --csv municipalities_archive_targets.csv \
            --state state.json \
            --batch-size 5 \
            --sleep-sec 30 \
            --timeout-sec 90 \
            --max-attempts 2 \
            --recent-days 3

      - name: Commit state
        run: |
          git config user.name "municipality-archive-bot"
          git config user.email "actions@github.com"

          git pull --rebase --autostash origin main

          git add state.json

          if git diff --cached --quiet; then
            echo "No state changes"
            exit 0
          fi

          git commit -m "Update archive state"

          for i in 1 2 3; do
            git push && exit 0
            echo "Push failed. Retry $i"
            git pull --rebase --autostash origin main
            sleep 5
          done

          exit 1
