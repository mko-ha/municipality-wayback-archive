name: Archive municipalities to Wayback

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: municipality-wayback-archive
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run archive batch
        run: |
          python archive_wayback.py --batch-size 4 --sleep-sec 25 --timeout-sec 180

      - name: Commit state and log
        run: |
          git config user.name "municipality-archive-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Update archive state and log" || echo "No changes"
          git pull --rebase origin main
          git push
